<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Segmentation de clients{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet" crossorigin="anonymous">

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">

    <!-- CSS personnalisé -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_head %}{% endblock %}
</head>
<body class="{% if request.cookies.get('site_theme') == 'light' %}light-theme{% endif %}">
    <!-- Header / Navbar -->
    <header class="header sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand display-5" href="{{ url_for('main.index') }}">Segmentation Clients</a>
                <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == url_for('main.index') %}active{% endif %}" href="{{ url_for('main.index') }}">Accueil</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == url_for('main.stats') %}active{% endif %}" href="{{ url_for('main.stats') }}">Stats</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == url_for('main.clusters') %}active{% endif %}" href="{{ url_for('main.clusters') }}">Clusters</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == url_for('main.summary') %}active{% endif %}" href="{{ url_for('main.summary') }}">Synthèse</a>
                        </li>
                    </ul>
                   
                </div>
            </div>
        </nav>
    </header>

    <!-- Main content -->
    <main class="container mt-5">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer mt-5 py-4 bg-dark text-white">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>Segmentation Clients</h5>
                    <p>Projet clustering et analyse du comportement d’achat.</p>
                </div>
                <div class="col-md-6 text-end">
                    <p>&copy; 2025 - Zeineb CHAKIB & Rachida EL RHASSAL</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    {% block scripts %}{% endblock %}
    <script src="{{ url_for('static', filename='js/theme_toggle.js') }}" defer></script>
</body>
</html>
